<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <header>
        <!-- Puedes agregar logo, título, etc. -->
    </header>
    <main>
        <!-- menu -->
        <section id="secMenu" class="tarjeta" style="display:none">
            <div class="encabezado">
                <div class="icono">🧳</div>
                <h4>Bienvenid@</h4>
            </div>
            <input type="button" value="Registrar Clientes" onclick="fnIrRegistrarCliente()">
            <input type="button" value="Registrar Reserva" onclick="fnIrRegistrarReserva()">
  
        </section>


        <!-- Login -->
        <section id="secLogin" class="tarjeta">
            <div class="encabezado">
                <div class="icono">🧳</div>
                <h4>Login</h4>
            </div>
            <input type="text" id="txtUsuario" placeholder="Usuario">
            <input type="password" id="txtClave" placeholder="Clave">
            <input type="button" id="btnAgregar" value="Iniciar Sesion" onclick="fnLogin()">
        </section>

        <!-- Registrar Reserva -->
        <section id="secReserva" class="tarjeta" style="display:none">
            <h4>Registrar Reserva</h4>
            <select id="txtHabitacion">
                <option value="">-- Seleccionar Habitación --</option>
                <option value="1">Habitación #1</option>
                <option value="2">Habitación #2</option>
                <option value="3">Habitación #3</option>
                <option value="4">Habitación #4</option>
                <option value="5">Habitación #5</option>
            </select>
            <input type="text" id="txtDniClienteReserva" placeholder="Ingrese el DNI del cliente">
            <input type="text" id="txtFechaIngreso" placeholder="Ingrese fecha de ingreso dd/mm/aaaa">
            <input type="text" id="txtFechaEgreso" placeholder="Ingrese fecha de egreso dd/mm/aaaa">
            <input type="number" id="txtCantidadPersonas" placeholder="Cantidad de huéspedes">
            <select id="txtEstadoReserva">
                <option value="">-- Estado de la Reserva --</option>
                <option value="pendiente">Pendiente</option>
                <option value="confirmada">Confirmada</option>
                <option value="cancelada">Cancelada</option>
            </select>
            <input type="button" id="btnEnviarReserva" value="Registrar Reserva" onclick="fnRegistrarReserva()">
            <input type="button" value="Volver" onclick="fnVolver('secReserva')">
        </section>

        <!-- Registrar Cliente -->
        <section id="secRegistrarCliente" class="tarjeta" style="display:none">
            <h4>Registrar Cliente</h4>
            <input type="text" id="txtNombreClnte" placeholder="Nombre">
            <input type="text" id="txtApellidoClnte" placeholder="Apellido">
            <input type="text" id="txtDNIClnte" placeholder="DNI">
            <input type="text" id="txtEmailClnte" placeholder="E-mail">
            <input type="text" id="txtNroTelClnte" placeholder="Contacto">
            <input type="text" id="txtDireccionClnte" placeholder="Dirección">
            <input type="button" id="btnEnviarCliente" value="Registrar Cliente" onclick="fnRegistrarCliente()">
            <input type="button" value="Volver" onclick="fnVolver('secRegistrarCliente')">
        </section>
    </main>
    <footer>
        <!-- pie de pagina -->
         <footer style="background:#f2f2f2;padding:15px;text-align:center;">
    <p>Link Córdoba Hostel</p>
    <p>Sede: Jujuy 267 | Córdoba, Argentina</p>
    <div style="margin:0 auto; max-width:400px;">
        <!-- Mapa de Google incrustado -->
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3405.1152067451526!2d-64.1922222244447!3d-31.410951795988566!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9432987f29efc1a1%3A0xe846d4c6903eb37c!2sJujuy%20267%2C%20X5000KAE%20C%C3%B3rdoba!5e0!3m2!1ses!2sar!4v1779680119169!5m2!1ses!2sar"
            width="100%" 
            height="200" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        
    </div>
    <span>Desarrollado por <a href="https://github.com/kevinwired" target="_blank"><b>kevinwired</b></a></span>
</footer>
    </footer>
</body>
<script>
// lista de usuarios
let admins = [
    { usuario: "kevin",   clave: "sa" },
    { usuario: "micaela", clave: "micaela" },
    { usuario: "jimena", clave: "jimena"},
    { usuario: "cielo", clave: "cielo"},
    { usuario: "lucas", clave: "lucas"}
];

// Login de administrador
function fnLogin() {
    const vUsuario = document.getElementById("txtUsuario").value;
    const vClave = document.getElementById("txtClave").value;

    if (vUsuario === "" || vClave === "") {
        alert("Campo usuario o clave vacío(s)!");
        return;
    }

    let admin = admins.find(j => j.usuario === vUsuario && j.clave === vClave);

    if (!admin) {
        alert("Usuario o clave incorrectos");
        return;
    }

    document.getElementById("secLogin").style.display = "none";
    document.getElementById("secMenu").style.display = "block";
}

// Navegacion
function fnIrRegistrarCliente() {
    document.getElementById("secMenu").style.display = "none";
    document.getElementById("secRegistrarCliente").style.display = "block";
}
function fnIrRegistrarReserva() {
    document.getElementById("secMenu").style.display = "none";
    document.getElementById("secReserva").style.display = "block";
}

function fnVolver(seccion) {
    document.getElementById(seccion).style.display = "none";
    document.getElementById("secMenu").style.display = "block";
}

// Registrar Cliente
function fnRegistrarCliente() {
    const nombre    = document.getElementById("txtNombreClnte").value.trim();
    const apellido  = document.getElementById("txtApellidoClnte").value.trim();
    const dni       = document.getElementById("txtDNIClnte").value.trim();
    const email     = document.getElementById("txtEmailClnte").value.trim();
    const telefono  = document.getElementById("txtNroTelClnte").value.trim();
    const direccion = document.getElementById("txtDireccionClnte").value.trim();

    if (!nombre || !apellido || !dni || !email || !telefono || !direccion) {
        alert("¡Por favor completa todos los campos obligatorios!");
        return;
    }

    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
    const existeDNI = clientes.some(c => c.dni === dni);
    if (existeDNI) {
        alert("El DNI ingresado ya está registrado. Verifica el dato.");
        return;
    }
    const cliente = { nombre, apellido, dni, email, telefono, direccion };
    clientes.push(cliente);
    localStorage.setItem("clientes", JSON.stringify(clientes));
    alert("¡Cliente registrado exitosamente!");

    // Limpiar campos
    document.getElementById("txtNombreClnte").value = "";
    document.getElementById("txtApellidoClnte").value = "";
    document.getElementById("txtDNIClnte").value = "";
    document.getElementById("txtEmailClnte").value = "";
    document.getElementById("txtNroTelClnte").value = "";
    document.getElementById("txtDireccionClnte").value = "";

    fnVolver('secRegistrarCliente');
}

// Registrar Reserva
function fnRegistrarReserva() {
    const habitacion = document.getElementById("txtHabitacion").value;
    const dniCliente = document.getElementById("txtDniClienteReserva").value.trim();
    const fechaIngreso = document.getElementById("txtFechaIngreso").value.trim();
    const fechaEgreso = document.getElementById("txtFechaEgreso").value.trim();
    const cantPersonas = parseInt(document.getElementById("txtCantidadPersonas").value);
    const estado = document.getElementById("txtEstadoReserva").value;

    if (!habitacion || !dniCliente || !fechaIngreso || !fechaEgreso || Number.isNaN(cantPersonas) || !estado) {
        alert("Por favor completá todos los campos");
        return;
    }

    // validar que el cliente exista
    let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
    const cliente = clientes.find(c => c.dni === dniCliente);
    if (!cliente) {
        alert("El cliente ingresado no existe. Registre el cliente primero.");
        return;
    }

    let reservas = JSON.parse(localStorage.getItem("reservas")) || [];

    // Validar habitacion
    const existeSuperposicion = reservas.some(r =>
        r.habitacion === habitacion &&
        !(
          fechaEgreso <= r.fechaIngreso || // La nueva termina antes de que empiece la existente
          fechaIngreso >= r.fechaEgreso    // La nueva empieza después de que termina la existente
        ) &&
        r.estado !== 'cancelada'
    );
    if (existeSuperposicion) {
        alert("Ya existe una reserva para esa habitación en las fechas seleccionadas.");
        return;
    }

    // Registrar la reserva
    const reserva = {
        habitacion,
        dniCliente,
        fechaIngreso,
        fechaEgreso,
        cantPersonas,
        estado
    };
    reservas.push(reserva);
    localStorage.setItem("reservas", JSON.stringify(reservas));
    alert("¡Reserva registrada exitosamente!");

    // Limpiar campos
    document.getElementById("txtHabitacion").value = "";
    document.getElementById("txtDniClienteReserva").value = "";
    document.getElementById("txtFechaIngreso").value = "";
    document.getElementById("txtFechaEgreso").value = "";
    document.getElementById("txtCantidadPersonas").value = "";
    document.getElementById("txtEstadoReserva").value = "";

    fnVolver('secReserva');
}
</script>
</html>
