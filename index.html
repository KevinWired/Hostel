<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <header>
        <!-- logo hostel link -->
    </header>

    <main>

        <!-- MENU -->
        <section id="secMenu" class="tarjeta" style="display:none">

            <div class="encabezado">
                <div class="icono">🧳</div>
                <h4>Bienvenid@</h4>
            </div>

            <input type="button" id="btnIrRegistrarCliente"    value="Registrar Clientes">
            <input type="button" id="btnIrRegistrarReserva"    value="Registrar Reserva">
            <input type="button" id="btnIrRegistrarHabitacion" value="Registrar Habitacion">
            <input type="button" id="btnVerHabitaciones"       value="Ver Habitaciones">
            <input type="button" id="btnVerClientes"           value="Ver Clientes">
            <input type="button" id="btnVerReservas"           value="Ver Reservas">

        </section>

        <!-- LOGIN -->
        <section id="secLogin" class="tarjeta">
            <div class="encabezado">
                <div class="icono">🧳</div>
                <h4>Login</h4>
            </div>
            <input type="text"     id="txtUsuario" placeholder="Usuario">
            <input type="password" id="txtClave"   placeholder="Clave">
            <input type="button"   id="btnAgregar" value="Iniciar Sesion">
        </section>

        <!-- REGISTRAR RESERVA -->
        <section id="secReserva" class="tarjeta" style="display:none">
            <h4>Registrar Reserva</h4>
            <select id="txtHabitacion">
                <option value=""> >> Seleccionar Habitación </option>
                <option value="1">Habitación #1</option>
                <option value="2">Habitación #2</option>
                <option value="3">Habitación #3</option>
                <option value="4">Habitación #4</option>
                <option value="5">Habitación #5</option>
            </select>
            <input type="text"   id="txtDniClienteReserva"  placeholder="Ingrese el DNI del cliente">
            <input type="text"   id="txtFechaIngreso"        placeholder="Ingrese fecha de ingreso dd/mm/aaaa">
            <input type="text"   id="txtFechaEgreso"         placeholder="Ingrese fecha de egreso dd/mm/aaaa">
            <input type="number" id="txtCantidadPersonas"    placeholder="Cantidad de huéspedes">
            <select id="txtEstadoReserva">
                <option value="">-- Estado de la Reserva --</option>
                <option value="pendiente">Pendiente</option>
                <option value="confirmada">Confirmada</option>
                <option value="cancelada">Cancelada</option>
            </select>
            <input type="button" id="btnEnviarReserva" value="Registrar Reserva">
            <input type="button" id=    "btnVolverReserva" value="Volver">
        </section>

        <!-- REGISTRAR CLIENTE -->
        <section id="secRegistrarCliente" class="tarjeta" style="display:none">
            <h4>Registrar Huesped</h4>
            <input type="text" id="txtNombreClnte"    placeholder="Nombre">
            <input type="text" id="txtApellidoClnte"  placeholder="Apellido">
            <input type="text" id="txtDNIClnte"       placeholder="DNI">
            <input type="text" id="txtEmailClnte"     placeholder="E-mail">
            <input type="text" id="txtNroTelClnte"    placeholder="Contacto">
            <input type="text" id="txtDireccionClnte" placeholder="Dirección">
            <input type="button" id="btnEnviarCliente" value="Registrar Cliente">
            <input type="button" id="btnVolverCliente" value="Volver">
        </section>

        <!-- REGISTRAR HABITACION -->
        <section id="secRegistrarHabitacion" class="tarjeta" style="display:none">
            <h4>Registrar Habitacion</h4>
            <input type="text" id="txtIdHabitacion"   placeholder="ID de habitación">
            <input type="text" id="txtTipoHabitacion" placeholder="Tipo de Habitación">
            <input type="text" id="txtPisoHabitacion" placeholder="Piso">
            <input type="text" id="txtCapacidad"      placeholder="Capacidad Maxima">
            <input type="button" id="btnEnviarHabitacion" value="Registrar Habitación">
            <input type="button" id="btnVolverHabitacion" value="Volver">
        </section>

        <!-- LISTA HABITACIONES -->
        <section id="secListaHabitaciones" class="tarjeta" style="display:none">
            <h4>📋 Habitaciones Registradas</h4>
            <div id="listaHabitaciones"></div>
            <input type="button" id="btnVolverListaHabitaciones" value="Volver">
        </section>

        <!-- LISTA CLIENTES -->
        <section id="secListaClientes" class="tarjeta" style="display:none">

            <h4>👥 Clientes Registrados</h4>
            <div id="listaClientes"></div>
            <input type="button" id="btnVolverListaClientes" value="Volver">

        </section>

        <!-- LISTA RESERVAS -->
        <section id="secListaReservas" class="tarjeta" style="display:none">

            <h4>📅 Reservas Registradas</h4>
            <div id="listaReservas"></div>
            <input type="button" id="btnVolverListaReservas" value="Volver">

        </section>

    </main>

    <footer style="background:#f2f2f2;padding:15px;text-align:center;">
        <p>Link Córdoba Hostel</p>
        <p>Sede: Jujuy 267 | Córdoba, Argentina</p>
    </footer>

    <!-- app.js es el punto de entrada principal; registrarHabitacion.js se importa desde app.js -->
    <script type="module" src="./app.js"></script>

</body>
</html>
